name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      PYGAME_HEADLESS: "1"
      SDL_VIDEODRIVER: dummy
      SDL_AUDIODRIVER: dummy
      PYTHONUNBUFFERED: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          if [ -f requirements-dev.txt ]; then
            pip install -r requirements-dev.txt
          fi

      - name: Compile package
        run: python -m compileall hololive_coliseum

      - name: Run tests
        run: pytest -q

      - name: Episode runner sanity
        run: |
          python -m hololive_coliseum.tools.episode_runner \
            --scenario basic \
            --frames 60 \
            --seed 1337 \
            --headless \
            --output-dir SavedGames/ci_episode

      - name: UI smoke sanity
        run: |
          python -m hololive_coliseum.tools.ui_smoke_runner \
            --mode menu \
            --frames 30 \
            --font-scale 1.0 \
            --res 1280x720 \
            --output-dir SavedGames/ci_ui \
            --verbose

      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ci-failure-artifacts
          path: |
            SavedGames/**
            **/episode_report.json
            **/episode_trace.jsonl
            **/ui_smoke_report*.json
            **/ui_layout_summary*.json
          if-no-files-found: warn
